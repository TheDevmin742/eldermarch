<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Casting Table</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --parchment-50:#FBF6E9; --parchment-100:#F6EFDC; --parchment-200:#F1E7CF; --parchment-300:#E8DCC0; --parchment-400:#D9C79A;
  --ink-900:#2C2417; --ink-700:#3A2E1D; --ink-500:#6A5836; --ink-400:#9A824F;
  --rust-700:#7A2D20; --rust-600:#9C3D2E; --rust-100:#F0D8CC;
  --brass-700:#8A6320; --brass-500:#B6964A; --brass-400:#C7A14E; --brass-200:#E6D8B4;
  --health-600:#9A3B2E;
  --surface-card:var(--parchment-50);
  --text-heading:var(--ink-900); --text-body:var(--ink-700); --text-muted:var(--ink-500); --text-faint:var(--ink-400);
  --accent:var(--rust-600); --accent-hover:var(--rust-700); --accent-soft:var(--rust-100);
  --border-default:var(--parchment-400); --border-soft:var(--brass-200); --border-strong:#A88A5E;
  --font-display:'Cinzel','Times New Roman',serif;
  --font-body:'EB Garamond',Georgia,serif;
  --font-flavor:'IM Fell English',Georgia,serif;
  --radius-md:5px; --radius-lg:8px;
  --shadow-xs:0 1px 2px rgba(43,31,20,.10); --shadow-sm:0 2px 6px rgba(43,31,20,.12); --shadow-md:0 6px 18px rgba(43,31,20,.14);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  min-height:100vh;
  background:radial-gradient(120% 80% at 50% -10%, var(--brass-200) 0%, var(--parchment-100) 42%, var(--parchment-300) 100%);
  font-family:var(--font-body);color:var(--text-body);
  padding:clamp(20px,4vw,56px) 20px 64px;
}
a.back{font-family:var(--font-display);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);text-decoration:none;display:block;max-width:1120px;margin:0 auto 10px;}

header.ct{max-width:1120px;margin:0 auto 36px;text-align:center;}
.flavor-line{font-family:var(--font-flavor);font-style:italic;color:var(--text-muted);font-size:.95rem;letter-spacing:.04em;margin-bottom:6px;}
h1{font-family:var(--font-display);font-weight:700;color:var(--text-heading);font-size:clamp(2rem,5vw,3rem);margin:0;letter-spacing:.04em;}
.rule-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px;color:var(--brass-700);}
.rule-row .line{height:1px;width:70px;background:var(--brass-500);opacity:.6;}
.rule-row .label{font-family:var(--font-display);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;}

.layout{max-width:1120px;margin:0 auto;display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start;}
main.col{flex:1 1 520px;min-width:320px;display:flex;flex-direction:column;gap:20px;}
aside.col{flex:1 1 240px;min-width:240px;max-width:320px;display:flex;flex-direction:column;gap:18px;}

.die-types{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.die-types button{
  font-family:var(--font-display);font-size:.9rem;letter-spacing:.04em;padding:9px 15px;
  border-radius:var(--radius-md);cursor:pointer;min-width:54px;
  transition:background-color .12s ease,border-color .12s ease,color .12s ease;
  background:var(--surface-card);color:var(--text-body);border:1.5px solid var(--border-default);
}
.die-types button:hover{border-color:var(--accent);color:var(--accent);}
.die-types button.active{background:var(--accent);color:var(--parchment-50);border-color:var(--accent);box-shadow:var(--shadow-sm);}

.tray{
  position:relative;background:var(--surface-card);border:1px solid var(--border-strong);
  border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:16px 16px 8px;
}
.tray .canvas-wrap{position:relative;width:100%;aspect-ratio:25/16;}
.tray canvas{position:absolute;left:0;top:0;width:100%;height:100%;display:block;}
#breakdown{min-height:30px;padding:4px 0 6px;text-align:center;font-family:var(--font-flavor);font-style:italic;color:var(--text-muted);font-size:1rem;}

.controls{display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:center;}
.qty-wrap{display:flex;align-items:center;background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--radius-md);box-shadow:var(--shadow-xs);}
.qty-wrap.disabled{opacity:.4;pointer-events:none;}
.qty-wrap button{width:38px;height:38px;border:none;background:transparent;font-family:var(--font-display);font-size:1.3rem;color:var(--ink-700);cursor:pointer;}
.qty-num{min-width:64px;text-align:center;}
.qty-num b{font-family:var(--font-display);font-weight:500;font-size:1.4rem;color:var(--text-heading);}
.qty-num span{font-family:var(--font-display);font-size:.6rem;letter-spacing:.18em;color:var(--text-muted);display:block;text-transform:uppercase;}
#roll-btn{
  font-family:var(--font-display);font-weight:700;font-size:1.1rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--parchment-50);background:var(--accent);border:none;border-radius:var(--radius-md);
  padding:13px 40px;cursor:pointer;transition:transform .08s ease;box-shadow:var(--shadow-sm);
}
#roll-btn:hover{background:var(--accent-hover);}
#roll-btn:active{transform:translateY(1px);}
#roll-btn.rolling{opacity:.7;pointer-events:none;}

.panel{background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);}
.hist{padding:18px 20px;}
.hist-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.hist-head .t{font-family:var(--font-display);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);}
.hist-head button{background:transparent;border:none;font-family:var(--font-display);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-faint);cursor:pointer;}
#hist-list{display:flex;flex-direction:column;gap:8px;}
.hist-row{display:flex;align-items:center;gap:12px;padding-bottom:8px;border-bottom:1px solid var(--border-soft);}
.hist-row .lab{font-family:var(--font-display);font-size:.72rem;letter-spacing:.06em;color:var(--brass-700);min-width:64px;text-transform:uppercase;}
.hist-row .det{font-family:var(--font-flavor);font-style:italic;color:var(--text-muted);font-size:.9rem;flex:1;}
.hist-row .tot{font-family:var(--font-display);font-weight:700;font-size:1.1rem;color:var(--text-heading);}
.hist-row .tot.nat20{color:var(--brass-700);}
.hist-row .tot.nat1{color:var(--health-600);}
#hist-empty{font-family:var(--font-flavor);font-style:italic;color:var(--text-faint);font-size:.9rem;}

.panel .head{background:var(--ink-900);color:var(--parchment-50);padding:10px 16px;font-family:var(--font-display);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;border-radius:var(--radius-lg) var(--radius-lg) 0 0;}
.swatches{padding:18px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.swatches button{width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;border:2px solid rgba(43,31,20,.25);box-shadow:var(--shadow-xs);}
.swatches button.active{border:2px solid var(--ink-900);box-shadow:0 0 0 3px var(--brass-400),var(--shadow-xs);}
.swatches button.swatch-tide{
  position:relative;
  background:linear-gradient(155deg,#3FA8A0 0%,#1E5F7A 55%,#12395E 100%) !important;
}
.swatches button.swatch-tide::after{
  content:"";position:absolute;right:16%;top:16%;width:34%;height:34%;border-radius:50%;
  background:radial-gradient(circle at 38% 32%, #FFFDF6 0%, #EFE8DC 45%, #C9C4BC 80%, #B5B2AE 100%);
  box-shadow:0 1px 2px rgba(10,30,40,.4);
}
.swatches button.swatch-tide.active{box-shadow:0 0 0 3px #7fd0c4,var(--shadow-xs);}
.swatches button.swatch-hoard{
  position:relative;
  background:linear-gradient(140deg,#233B2C 0%,#141216 34%,#2E1A36 62%,#1A2440 100%) !important;
}
.swatches button.swatch-hoard::after{
  content:"✦";position:absolute;right:12%;top:8%;font-size:11px;line-height:1;color:#F2D588;
  text-shadow:0 0 4px rgba(242,213,136,.8);
}
.swatches button.swatch-hoard.active{box-shadow:0 0 0 3px #d9b75a,var(--shadow-xs);}
.swatches button.swatch-works{
  position:relative;
  background:linear-gradient(145deg,#C9A55C 0%,#A98544 45%,#6E5426 100%) !important;
}
.swatches button.swatch-works::after{
  content:"";position:absolute;right:14%;top:14%;width:30%;height:30%;border-radius:50%;
  background:radial-gradient(circle at 40% 35%, #9FE8FF 0%, #4A5058 45%, #23272C 100%);
  box-shadow:0 0 5px rgba(159,232,255,.55);
}
.swatches button.swatch-works.active{box-shadow:0 0 0 3px #cdb478,var(--shadow-xs);}
.swatches button.swatch-moon{
  position:relative;
  background:linear-gradient(150deg,#4A4062 0%,#2C2740 55%,#1B1830 100%) !important;
}
.swatches button.swatch-moon::after{
  content:"☾";position:absolute;right:10%;top:4%;font-size:13px;line-height:1;color:#E9E7F6;
  text-shadow:0 0 5px rgba(226,228,250,.8);
}
.swatches button.swatch-moon.active{box-shadow:0 0 0 3px #b9b4d8,var(--shadow-xs);}
.decos{padding:14px;display:flex;flex-direction:column;gap:8px;}
.decos button{
  display:flex;flex-direction:column;align-items:flex-start;gap:1px;text-align:left;
  padding:9px 13px;border-radius:var(--radius-md);cursor:pointer;
  transition:background-color .12s ease,border-color .12s ease,color .12s ease;
  background:var(--surface-card);border:1.5px solid var(--border-default);color:var(--text-body);
}
.decos button.active{background:var(--accent-soft);border-color:var(--accent);color:var(--rust-700);}
.decos .dl{font-family:var(--font-display);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;}
.decos .dn{font-family:var(--font-flavor);font-style:italic;font-size:.9rem;opacity:.8;}
.aside-note{padding:2px 6px;font-family:var(--font-flavor);font-style:italic;color:var(--text-faint);font-size:.9rem;text-align:center;}
</style>
</head>
<body>
<a class="back" href="../index.html">&larr; Back to the Hub</a>

<header class="ct">
  <div class="flavor-line">The dice remember nothing. Only the table does.</div>
  <h1>The Casting Table</h1>
  <div class="rule-row">
    <span class="line"></span>
    <span class="label">A kinder set of dice</span>
    <span class="line"></span>
  </div>
</header>

<div class="layout">
  <main class="col">
    <div class="die-types" id="die-types"></div>

    <!-- the casting tray -->
    <div class="tray">
      <div class="canvas-wrap"><canvas id="tray-canvas"></canvas></div>
      <div id="breakdown"></div>
    </div>

    <div class="controls">
      <div class="qty-wrap" id="qty-wrap">
        <button id="qty-dec" aria-label="fewer dice">&minus;</button>
        <div class="qty-num"><b id="qty-val">1</b><span>dice</span></div>
        <button id="qty-inc" aria-label="more dice">+</button>
      </div>
      <button id="roll-btn">Roll</button>
    </div>

    <div class="panel hist">
      <div class="hist-head">
        <span class="t">The table remembers</span>
        <button id="hist-clear">Clear</button>
      </div>
      <div id="hist-list"></div>
      <div id="hist-empty">None yet &mdash; the dice are still in the cup.</div>
    </div>
  </main>

  <aside class="col">
    <div class="panel">
      <div class="head">Dice colour</div>
      <div class="swatches" id="swatches"></div>
    </div>
    <div class="panel">
      <div class="head">Dice mat</div>
      <div class="decos" id="decos"></div>
    </div>
    <div class="aside-note">A natural twenty flashes like dawn. A natural one&hellip; bring a broom.</div>
  </aside>
</div>

<!-- bump ?v= whenever js/dice-engine.js changes, so caches can't serve a stale engine -->
<script src="js/cannon.js?v=4"></script>
<script type="module">
import { createDiceStage } from './js/dice-engine.js?v=4';

const SIDES = { d4:4, d6:6, d8:8, d10:10, d12:12, d20:20, d100:100 };

const SWATCHES = [
  { id:'rust',  name:'Terracotta', body:'#9C3D2E', light:false },
  { id:'health',name:'Blood',      body:'#7A2D20', light:false },
  { id:'brass', name:'Brass',      body:'#B6964A', light:true  },
  { id:'sage',  name:'Moss',       body:'#5C6B4E', light:false },
  { id:'mana',  name:'Arcane',     body:'#3E5C6B', light:false },
  { id:'ink',   name:'Obsidian',   body:'#2C2417', light:false },
  { id:'parch', name:'Bone',       body:'#E8DCC0', light:true  },
  { id:'plum',  name:'Nightshade', body:'#5A3A52', light:false },
  /* The character sets — each with one signature d20 and its own mat. */
  { id:'tide',  name:'The Rising Tide — Thalasstheos', body:'#2FA093', light:false, special:'tide' },
  { id:'hoard', name:'The Magpie’s Hoard — Kree', body:'#1A1720', light:false, special:'hoard' },
  { id:'works', name:'The Tinker’s Works — Wilhelm', body:'#A98544', light:false, special:'works' },
  { id:'moon',  name:'The Borrowed Moon — Kenra', body:'#3B3552', light:false, special:'moon' }
];

const DECOS = [
  { id:'plain',   label:'Plain',       note:'just the felt' },
  { id:'glow',    label:'Candlelight', note:'a warm halo' },
  { id:'filigree',label:'Filigree',    note:'brass flourishes' },
  { id:'runes',   label:'Runes',       note:'an arcane ring' },
  { id:'heraldic',label:'Heraldic',    note:'a double frame' },
  { id:'beach',   label:'Rocky Beach', note:'surf, stones, and sea-light' },
  { id:'nest',    label:'The Nest',    note:'twigs and treasures' },
  { id:'bench',   label:'The Workbench', note:'schematics and sawdust' },
  { id:'glade',   label:'Moonlit Glade', note:'fireflies and silver light' }
];

/* which mat belongs to which set — suggested, never forced */
const SET_MATS = { tide:'beach', hoard:'nest', works:'bench', moon:'glade' };

/* what the signature d20 says when fate speaks */
const SET_LINES = {
  tide:  { crit:'The tide always comes back.', fumble:'…the tide went out.',
           critDetail:'the tide always comes back', fumbleDetail:'the tide went out' },
  hoard: { crit:'A shiny for the hoard!', fumble:'…someone stole it.',
           critDetail:'a shiny for the hoard', fumbleDetail:'someone stole it' },
  works: { crit:'Precisely as designed.', fumble:'…back to the bench.',
           critDetail:'precisely as designed', fumbleDetail:'back to the bench' },
  moon:  { crit:'The moon shows her full face.', fumble:'…the new moon keeps her secrets.',
           critDetail:'the moon shows her full face', fumbleDetail:'the new moon keeps her secrets' }
};

/* physics feel */
const THROW_STRENGTH = 1.2, SLOW_MOTION = false, KEEP_DICE = false;

const state = { type:'d20', qty:1, color:'rust', deco:'glow', rolling:false };
const history = [];
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const curSwatch = () => SWATCHES.find(s => s.id === state.color) || SWATCHES[0];
const cap = type => type === 'coin' ? 1 : (type === 'd100' ? 4 : 8);

let stage = null;
try {
  stage = createDiceStage($('tray-canvas'), { type: state.type, color: curSwatch(), theme: state.deco });
  window.__casting = stage; // handy for poking at it from the console
} catch (e) {
  console.error('dice engine failed to start', e);
}

/* ---------- describe outcomes (same words as the design) ---------- */
function describe(out){
  const type = out.type;
  if (type === 'coin'){
    const heads = out.total === 'Heads';
    return { label:'COIN', totalText: out.total,
      breakdown: heads ? 'the coin lands face up' : 'the coin lands face down',
      detail: heads ? 'heads' : 'tails' };
  }
  if (type === 'd100'){
    const n = out.dice.length;
    const label = n > 1 ? n + 'd100' : 'd100';
    if (n === 1){
      const d0 = out.dice[0];
      const bd = String(d0.tens).padStart(2,'0') + ' + ' + d0.units + ' = ' + d0.value;
      return { label, totalText: String(out.total), breakdown: bd, detail: 'percentile: ' + bd };
    }
    return { label, totalText: String(out.total),
      breakdown: out.values.join(' + ') + ' = ' + out.total,
      detail: out.values.join(', ') };
  }
  const n = out.values.length;
  const label = n > 1 ? n + type : type;
  const lines = SET_LINES[state.color] || null;
  let critNote = '';
  if (out.crit === 'nat20') critNote = lines ? ' — “' + lines.crit + '”' : ' — natural twenty!';
  if (out.crit === 'nat1') critNote = lines ? ' — “' + lines.fumble + '”' : ' — the die shatters';
  if (n === 1){
    return { label, totalText: String(out.total),
      breakdown: type + ' → ' + out.total + critNote,
      detail: out.crit === 'nat20' ? (lines ? 'a natural 20 — ' + lines.critDetail : 'a natural 20')
        : out.crit === 'nat1' ? (lines ? 'a natural 1 — ' + lines.fumbleDetail : 'a natural 1 — swept from the felt')
        : 'a single ' + type };
  }
  return { label, totalText: String(out.total),
    breakdown: out.values.join(' + ') + ' = ' + out.total + critNote,
    detail: out.values.join(', ') + (out.crit === 'nat20' ? (lines ? ' · ' + lines.critDetail : ' · a twenty among them')
      : out.crit === 'nat1' ? (lines ? ' · ' + lines.fumbleDetail : ' · one die shattered') : '') };
}

/* ---------- rendering ---------- */
function renderTypes(){
  $('die-types').innerHTML = ['d4','d6','d8','d10','d12','d20','d100','coin'].map(id =>
    `<button data-type="${id}" class="${id === state.type ? 'active' : ''}">${id === 'coin' ? 'Coin' : id}</button>`).join('');
}
function renderSwatches(){
  $('swatches').innerHTML = SWATCHES.map(s =>
    `<button data-color="${s.id}" title="${s.name}" class="${s.special ? 'swatch-' + s.id + ' ' : ''}${s.id === state.color ? 'active' : ''}" style="background:${s.body}"></button>`).join('');
}
function renderDecos(){
  $('decos').innerHTML = DECOS.map(d =>
    `<button data-deco="${d.id}" class="${d.id === state.deco ? 'active' : ''}"><span class="dl">${d.label}</span><span class="dn">${d.note}</span></button>`).join('');
}
function renderHistory(){
  $('hist-list').innerHTML = history.map(h =>
    `<div class="hist-row"><span class="lab">${esc(h.label)}</span><span class="det">${esc(h.detail)}</span><span class="tot ${h.crit || ''}">${esc(h.total)}</span></div>`).join('');
  $('hist-empty').style.display = history.length ? 'none' : '';
}
function renderControls(){
  const coin = state.type === 'coin';
  $('qty-val').textContent = state.qty;
  $('qty-wrap').classList.toggle('disabled', coin || state.rolling);
  $('roll-btn').classList.toggle('rolling', state.rolling);
  $('roll-btn').textContent = state.rolling ? (coin ? 'Flipping…' : 'Casting…') : (coin ? 'Flip' : 'Roll');
  $('die-types').style.pointerEvents = state.rolling ? 'none' : '';
}

/* ---------- fallback if the engine could not start ---------- */
function fallbackRoll(){
  const coin = state.type === 'coin';
  const sides = coin ? 2 : SIDES[state.type];
  const n = coin ? 1 : state.qty;
  const rolls = [];
  for (let i = 0; i < n; i++) rolls.push(1 + Math.floor(Math.random() * sides));
  const total = rolls.reduce((a,b) => a + b, 0);
  const display = coin ? (rolls[0] === 1 ? 'Heads' : 'Tails') : String(total);
  $('breakdown').textContent = coin ? '' : rolls.join(' + ') + ' = ' + total;
  history.unshift({ label: coin ? 'COIN' : (n > 1 ? n + state.type : state.type), detail: rolls.join(', '), total: display, crit:'' });
  if (history.length > 10) history.pop();
  renderHistory();
}

/* ---------- actions ---------- */
let watchdog = null;
async function roll(){
  if (state.rolling) return;
  if (!stage){ fallbackRoll(); return; }
  const coin = state.type === 'coin';
  state.rolling = true;
  $('breakdown').textContent = coin ? 'the coin is in the air…' : 'the dice are cast…';
  renderControls();
  clearTimeout(watchdog);
  watchdog = setTimeout(() => { if (state.rolling){ state.rolling = false; renderControls(); } }, 18000);
  try {
    const out = await stage.roll({
      type: state.type, qty: state.qty, color: curSwatch(),
      throwStrength: THROW_STRENGTH, slowMotion: SLOW_MOTION, keepDice: KEEP_DICE
    });
    const d = describe(out);
    history.unshift({ label: d.label, detail: d.detail, total: d.totalText, crit: out.crit || '' });
    if (history.length > 10) history.pop();
    $('breakdown').textContent = d.breakdown;
    renderHistory();
  } catch(e){
    console.error(e);
  }
  state.rolling = false;
  renderControls();
}

$('die-types').addEventListener('click', e => {
  const b = e.target.closest('button[data-type]');
  if (!b || state.rolling) return;
  state.type = b.dataset.type;
  state.qty = Math.min(state.qty, cap(state.type));
  $('breakdown').textContent = '';
  if (stage) stage.setIdleDie({ type: state.type, color: curSwatch() });
  renderTypes(); renderControls();
});
$('swatches').addEventListener('click', e => {
  const b = e.target.closest('button[data-color]');
  if (!b) return;
  state.color = b.dataset.color;
  // picking a character's set lays out their mat too — unless the DM has
  // deliberately chosen a decorative mat, which we respect
  const pairedMat = SET_MATS[state.color];
  const swappable = ['glow', 'plain', ...Object.values(SET_MATS)];
  if (pairedMat && state.deco !== pairedMat && swappable.includes(state.deco)) {
    state.deco = pairedMat;
    if (stage) stage.setTheme(state.deco);
    renderDecos();
  }
  if (stage && !stage.isRolling()) stage.setIdleDie({ type: state.type, color: curSwatch() });
  renderSwatches();
});
$('decos').addEventListener('click', e => {
  const b = e.target.closest('button[data-deco]');
  if (!b) return;
  state.deco = b.dataset.deco;
  if (stage) stage.setTheme(state.deco);
  renderDecos();
});
$('qty-inc').addEventListener('click', () => {
  if (state.rolling) return;
  state.qty = Math.min(cap(state.type), state.qty + 1);
  renderControls();
});
$('qty-dec').addEventListener('click', () => {
  if (state.rolling) return;
  state.qty = Math.max(1, state.qty - 1);
  renderControls();
});
$('roll-btn').addEventListener('click', roll);
$('hist-clear').addEventListener('click', () => { history.length = 0; renderHistory(); });

renderTypes(); renderSwatches(); renderDecos(); renderControls(); renderHistory();
</script>
</body>
</html>
